<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistema de Crédito Vehicular</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Fuente Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/physics-toast.min.css">
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css">
    <script src="js/physics-toast.min.js"></script>
    <script src="js/notify.js"></script>
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-placeholder">🚙</div>
                <h1>Portal Corporativo</h1>
                <p>Gestión de Compra Inteligente</p>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ingrese su usuario" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label for="captcha-answer">Verificación: ¿cuánto es <strong id="captcha-question" style="color:var(--primary);">…</strong>?
                        <button type="button" id="captcha-refresh" title="Cambiar operación" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:15px;padding:0 4px;">↻</button>
                    </label>
                    <input type="text" id="captcha-answer" inputmode="numeric" placeholder="Escribe el resultado" autocomplete="off" required>
                </div>

                <button type="submit" class="btn-login">Acceder al Sistema</button>

                <div class="login-footer">
                    <a href="#" id="forgot-link">¿Olvidó su contraseña?</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
