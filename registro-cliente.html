<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🚗%3C/text%3E%3C/svg%3E" />
    <title>Clientes | Sistema Vehicular</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/physics-toast.min.css">
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css">
    <script src="js/physics-toast.min.js"></script>
    <script src="js/notify.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/layout.js"></script>
</head>
  <body>
    <main class="dashboard-container" style="max-width: 1500px;">
      <div class="login-card">
        <div class="table-toolbar">
          <div>
            <h2 style="font-size:21px; font-weight:800; color:var(--accent-dark);">Clientes</h2>
            <p style="color:var(--text-muted); margin-top:4px; font-size:14px;">Prospectos registrados en el sistema</p>
          </div>
          <form id="client-form">
            <div class="input-group">
              <label>DNI / CE</label>
              <div class="help-container">
                <input type="text" id="client-id" placeholder="Ej. 74589632" required />
                <span class="help-icon" data-tooltip="Documento de identidad del cliente. Debe contener 8 dígitos para DNI o 9 caracteres para Carné de Extranjería.">?</span>
              </div>
            </div>
            <div class="input-group">
              <label>Nombres y Apellidos</label>
              <div class="help-container">
                <input type="text" id="client-name" placeholder="Ej. Carlos Mendoza Ramos" required />
                <span class="help-icon" data-tooltip="Ingrese los nombres completos y apellidos del solicitante tal como aparecen en su documento de identidad.">?</span>
              </div>
            </div>
            <div class="input-group">
              <label>Correo Electrónico</label>
              <div class="help-container">
                <input type="email" id="client-email" placeholder="ejemplo@correo.com" required />
                <span class="help-icon" data-tooltip="Buzón de correo electrónico del cliente donde se enviará digitalmente la simulación del cronograma.">?</span>
              </div>
            </div>
            <div class="input-group">
              <label>Teléfono</label>
              <div class="help-container">
                <input type="text" id="client-phone" placeholder="Ej. 987654321" />
                <span class="help-icon" data-tooltip="Número celular de contacto (9 dígitos) para coordinaciones comerciales o alertas del crédito.">?</span>
              </div>
            </div>
            <div class="input-group">
              <label>Ingresos Mensuales Netos</label>
              <div class="help-container">
                <input type="number" id="client-income" min="0" placeholder="Ej. 3500" required />
                <span class="help-icon" data-tooltip="Sueldo neto percibido en cuenta bancaria demostrable. Sirve para evaluar el ratio de endeudamiento permitido.">?</span>
              </div>
            </div>
            <button type="submit" class="btn-login">Registrar Cliente</button>
          </form>
        </div>

        <div class="table-wrapper">
          <table class="banking-table" id="table-clients-history">
            <thead>
              <tr>
                <th>DNI / CE</th>
                <th>Nombres y Apellidos</th>
                <th>Correo Electrónico</th>
                <th>Celular</th>
                <th>Alternativo</th>
                <th>Ingresos Netos</th>
                <th>Consentimiento</th>
                <th>Acción</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- Modal: crear / editar cliente -->
    <div class="modal-overlay" id="client-modal" hidden>
      <div class="modal-card">
        <div class="modal-head">
          <div>
            <h2 id="modal-title">Nuevo cliente</h2>
            <p id="modal-subtitle">Ingresa los datos del nuevo prospecto</p>
          </div>
          <button class="modal-close" id="modal-close" aria-label="Cerrar"><i class="hgi-stroke hgi-cancel-01"></i></button>
        </div>

        <form id="client-form">
          <div class="input-group">
            <label>DNI / CE
              <span class="help-tip" data-tip="DNI: 8 dígitos. Carné de extranjería (CE): 9 a 12 caracteres.">?</span>
            </label>
            <input type="text" id="client-id" required />
            <div class="error-msg" id="err-client-id"></div>
          </div>
          <div class="input-group">
            <label>Nombres y Apellidos</label>
            <input type="text" id="client-name" required />
          </div>
          <div class="input-group">
            <label>Correo Electrónico
              <span class="help-tip" data-tip="Se usará para enviar la cotización al cliente.">?</span>
            </label>
            <input type="email" id="client-email" required />
            <div class="error-msg" id="err-client-email"></div>
          </div>
          <div class="input-grid-2">
            <div class="input-group">
              <label>Celular
                <span class="help-tip" data-tip="Celular del cliente. Solo dígitos.">?</span>
              </label>
              <input type="text" id="client-phone" required />
              <div class="error-msg" id="err-client-phone"></div>
            </div>
            <div class="input-group">
              <label>Teléfono alternativo <span class="label-opt">(opcional)</span></label>
              <input type="text" id="client-phone2" />
            </div>
          </div>
          <div class="input-group">
            <label>Ingresos mensuales netos <span class="label-opt">(opcional)</span>
              <span class="help-tip" data-tip="Para evaluar la capacidad de pago (SBS: cuota máx. 40% del ingreso).">?</span>
            </label>
            <input type="text" id="client-income" placeholder="0.00" />
            <div class="error-msg" id="err-client-income"></div>
          </div>

          <div class="input-group" id="consent-block">
            <label>Autorización de datos</label>
            <label class="consent-item">
              <input type="checkbox" id="consent-simulacion" required />
              <span>He leído y acepto la <a href="#" onclick="return false;">Política de Privacidad</a> y autorizo el tratamiento de mis datos personales para evaluar y gestionar mi solicitud de crédito.</span>
            </label>
            <label class="consent-item">
              <input type="checkbox" id="consent-difusion" />
              <span>Autorizo el uso de mis datos para recibir ofertas, promociones y publicidad de productos y servicios.</span>
            </label>
            <label class="consent-item">
              <input type="checkbox" id="consent-partners" />
              <span>Autorizo compartir mis datos con empresas aliadas para ofertas conjuntas.</span>
            </label>
            <p class="consent-note">Tratamos tus datos conforme a la Ley N.° 29733 de Protección de Datos Personales.</p>
          </div>

          <div class="modal-actions">
            <button type="button" class="btn-secondary" id="modal-cancel">Cancelar</button>
            <button type="submit" class="btn-login btn-inline" id="btn-save-client">Guardar</button>
          </div>
        </form>
      </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/clientes.js"></script>
  </body>
</html>
