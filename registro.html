<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🚗%3C/text%3E%3C/svg%3E">
    <title>Registro | Sistema de Crédito Vehicular</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/physics-toast.min.css">
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css">
    <script src="js/physics-toast.min.js"></script>
    <script src="js/notify.js"></script>
    <script src="js/ui.js"></script>
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Crear Usuario</h1>
                <p>Alta de asesores del sistema (solo administrador)</p>
            </div>

            <form id="register-form">
                <div class="input-group">
                    <label for="reg-fullname">Nombre Completo</label>
                    <input type="text" id="reg-fullname" placeholder="Ej. Juan Pérez" required>
                </div>

                <div class="input-group">
                    <label for="reg-username">Nombre de Usuario</label>
                    <input type="text" id="reg-username" placeholder="Usuario para login" required>
                </div>

                <div class="input-group">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" placeholder="Segura: 8+, mayús., minús., número y símbolo" required>
                    <p class="consent-note">Debe tener 8+ caracteres, una mayúscula, una minúscula, un número y un símbolo.</p>
                </div>

                <button type="submit" class="btn-login">Crear Usuario</button>

                <div class="login-footer">
                    <a href="gestion-admin.html">Volver al panel de administración</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
