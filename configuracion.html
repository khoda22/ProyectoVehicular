<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración | Sistema de Crédito Vehicular</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/physics-toast.min.css">
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css">
    <script src="js/physics-toast.min.js"></script>
    <script src="js/notify.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/layout.js"></script>
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <span class="system-name">SISTEMA DE CRÉDITO VEHICULAR</span>
            <span class="panel-tag">| Panel de Configuración</span>
        </div>
        <div class="user-info">
            <button onclick="window.location.href='simulador.html'" class="btn-secondary">Volver al Inicio</button>
        </div>
    </header>

    <main class="dashboard-container">
        <div class="login-card" style="max-width: 500px; margin: 0 auto;">
            <div class="login-header">
                <h1>Ajustes de Moneda</h1>
                <p>Seleccione la moneda base para los cálculos del sistema</p>
            </div>

            <div class="settings-group">
                <label class="radio-container">
                    Soles (S/)
                    <input type="radio" name="currency" value="PEN" id="radio-pen">
                    <span class="checkmark"></span>
                </label>
                
                <label class="radio-container">
                    Dólares (US$)
                    <input type="radio" name="currency" value="USD" id="radio-usd">
                    <span class="checkmark"></span>
                </label>
            </div>

            <div class="input-group" style="margin-top: 25px; text-align: left;">
                <label>Tipo de Cambio (S/ por US$)
                    <span class="help-tip" data-tip="Tipo de cambio referencial. El asesor puede ingresarlo manualmente o traer el del día desde una fuente en línea.">?</span>
                </label>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="config-tc" placeholder="Ej. 3.75" style="flex:1;">
                    <button type="button" id="btn-fetch-tc" class="btn-secondary" style="white-space:nowrap;">Traer TC del día</button>
                </div>
                <div class="status-msg" id="tc-status"></div>
            </div>

            <div style="margin-top: 30px;">
                <button id="save-config" class="btn-login">Guardar Preferencias</button>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentCurrency = localStorage.getItem('system_currency') || 'PEN';
            if (currentCurrency === 'PEN') document.getElementById('radio-pen').checked = true;
            else document.getElementById('radio-usd').checked = true;
            document.getElementById('config-tc').value = localStorage.getItem('system_tc') || '3.75';
        });

        // Trae un tipo de cambio referencial (API gratuita, sin token)
        document.getElementById('btn-fetch-tc').addEventListener('click', async () => {
            const status = document.getElementById('tc-status');
            status.textContent = 'Consultando...';
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                const pen = data && data.rates && data.rates.PEN;
                if (!pen) throw new Error('sin dato');
                document.getElementById('config-tc').value = Number(pen).toFixed(4);
                status.innerHTML = '<span style="color:#166534;">✔ Tipo de cambio del día cargado (referencial).</span>';
            } catch (e) {
                status.innerHTML = '<span style="color:var(--primary);">No se pudo obtener el TC. Ingréselo manualmente.</span>';
            }
        });

        document.getElementById('save-config').addEventListener('click', () => {
            const selected = document.querySelector('input[name="currency"]:checked').value;
            localStorage.setItem('system_currency', selected);
            const tc = parseFloat(document.getElementById('config-tc').value);
            if (!isNaN(tc) && tc > 0) localStorage.setItem('system_tc', tc);
            notify.ok('Configuración actualizada exitosamente.');
            setTimeout(() => window.location.href = 'simulador-credito.html', 800);
        });
    </script>
</body>
</html>
