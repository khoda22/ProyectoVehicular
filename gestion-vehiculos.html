<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🚗%3C/text%3E%3C/svg%3E" />
    <title>Vehículos | Sistema Vehicular</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/physics-toast.min.css">
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css">
    <script src="js/physics-toast.min.js"></script>
    <script src="js/notify.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/layout.js"></script>
</head>
  <body>
    <main class="dashboard-container" style="max-width: 1500px;">
      <div class="login-card">
        <div class="table-toolbar">
          <div>
            <h2 style="font-size:21px; font-weight:800; color:var(--accent-dark);">Vehículos</h2>
            <p style="color:var(--text-muted); margin-top:4px; font-size:14px;">Unidades disponibles para financiamiento</p>
          </div>
          <div class="toolbar-actions">
            <div class="search-box">
              <i class="hgi-stroke hgi-search-01"></i>
              <input type="text" id="vehicle-search" placeholder="Buscar por código, marca o modelo..." autocomplete="off" />
            </div>
            <button class="btn-login btn-inline" id="btn-new-vehicle">
              <i class="hgi-stroke hgi-add-01"></i> Nuevo vehículo
            </button>
          </div>
        </div>

        <div class="table-wrapper">
          <table class="banking-table" id="table-vehicles-history">
            <thead>
              <tr>
                <th>Código</th>
                <th>Marca</th>
                <th>Modelo</th>
                <th>Año</th>
                <th>Precio S/</th>
                <th>Precio $</th>
                <th>Acción</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- Modal: crear / editar vehículo -->
    <div class="modal-overlay" id="vehicle-modal" hidden>
      <div class="modal-card">
        <div class="modal-head">
          <div>
            <h2 id="modal-title">Nuevo vehículo</h2>
            <p id="modal-subtitle">Ingresa los datos de la unidad</p>
          </div>
          <button class="modal-close" id="modal-close" aria-label="Cerrar"><i class="hgi-stroke hgi-cancel-01"></i></button>
        </div>

        <form id="vehicle-form">
          <div class="input-group">
            <label>Código Interno / ID de Auto
              <span class="help-tip" data-tip="Código único del vehículo. Ej: TOY-001.">?</span>
            </label>
            <input type="text" id="car-id" placeholder="Ej. TOY-001" required />
            <div class="error-msg" id="err-car-id"></div>
          </div>
          <div class="input-grid-2">
            <div class="input-group">
              <label>Marca</label>
              <input type="text" id="car-brand" placeholder="Ej. Toyota" required />
            </div>
            <div class="input-group">
              <label>Modelo</label>
              <input type="text" id="car-model" placeholder="Ej. Corolla" required />
            </div>
          </div>
          <div class="input-group">
            <label>Año de Fabricación
              <span class="help-tip" data-tip="Año del vehículo (1900 a 2027).">?</span>
            </label>
            <input type="number" id="car-year" placeholder="Ej. 2026" min="1900" required />
            <div class="error-msg" id="err-car-year"></div>
          </div>
          <div class="input-grid-2">
            <div class="input-group">
              <label>Precio en Soles (S/)
                <span class="help-tip" data-tip="Precio en soles. Ej: 60,000.00">?</span>
              </label>
              <input type="text" id="car-price-pen" placeholder="0.00" required />
              <div class="error-msg" id="err-car-price-pen"></div>
            </div>
            <div class="input-group">
              <label>Precio en Dólares ($)
                <span class="help-tip" data-tip="Precio en dólares (para contratos en US$).">?</span>
              </label>
              <input type="text" id="car-price-usd" placeholder="0.00" required />
              <div class="error-msg" id="err-car-price-usd"></div>
            </div>
          </div>

          <div class="modal-actions">
            <button type="button" class="btn-secondary" id="modal-cancel">Cancelar</button>
            <button type="submit" class="btn-login btn-inline" id="btn-save-vehicle">Guardar</button>
          </div>
        </form>
      </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/vehiculos.js"></script>
  </body>
</html>
